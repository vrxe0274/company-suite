<div class="tab-panels">

  <!-- Step 1 — Receipt Information -->
  <section class="tab-panel is-active" id="tab-receipt">
    <div class="section-title">
      <div class="section-heading">
        <p class="section-kicker">Step 1</p>
        <h2>Receipt Information</h2>
      </div>
      <button id="newReceiptBtn" class="ghost-btn" type="button">New Receipt No.</button>
    </div>

    <div class="grid two">
      <label>Receipt No.<input id="receiptCode" type="text" /></label>
      <label>Date<input id="receiptDate" type="date" /></label>
    </div>
    <label>Prepared By<input id="preparedBy" type="text" placeholder="Staff name or cashier" /></label>
    <label>Receipt Note (optional)<textarea id="receiptNote" rows="3" placeholder="Any additional note to appear on the receipt..."></textarea></label>
  </section>

  <!-- Step 2 — Client Information -->
  <section class="tab-panel" id="tab-client">
    <div class="section-title">
      <div class="section-heading">
        <p class="section-kicker">Step 2</p>
        <h2>Client Information</h2>
      </div>
    </div>

    <div class="grid two">
      <label>Client Name<input id="clientName" type="text" placeholder="Full name" /></label>
      <label>Company (optional)<input id="clientCompany" type="text" placeholder="Company / organization" /></label>
    </div>
    <div class="grid two">
      <label>Contact No.<input id="clientContact" type="text" placeholder="Mobile / email" /></label>
      <label>Address (optional)<input id="clientAddress" type="text" placeholder="Street, city" /></label>
    </div>
  </section>

  <!-- Step 3 — Items & Pricing -->
  <section class="tab-panel" id="tab-services">
    <div class="section-title items-heading">
      <div class="section-heading">
        <p class="section-kicker">Step 3</p>
        <h2>Items &amp; Pricing</h2>
      </div>
      <div class="add-row-btns">
        <button id="addProductBtn"  class="ghost-btn add-product-btn"  type="button">+ Item</button>
        <button id="addDiscountBtn" class="ghost-btn add-discount-btn" type="button">− Discount</button>
        <button id="addInclusionBtn" class="ghost-btn add-inclusion-btn" type="button">+ Inclusion</button>
      </div>
    </div>

    <div class="verification-card">
      <label class="verify-label">
        <input id="itemsVerified" type="checkbox" />
        <span>I have reviewed and verified that the items, quantities, and prices are correct for this receipt.</span>
      </label>
    </div>

    <div id="itemsList" class="items-list"></div>
  </section>

  <!-- Step 4 — Payment -->
  <section class="tab-panel" id="tab-payment">
    <div class="section-title">
      <div class="section-heading">
        <p class="section-kicker">Step 4</p>
        <h2>Payment Details</h2>
      </div>
    </div>

    <div class="grid two">
      <label>Payment Method<input id="paymentMethod" type="text" placeholder="e.g. Cash, GCash, Card" /></label>
      <label>Reference No. (optional)<input id="paymentReference" type="text" placeholder="Transaction / ref no." /></label>
    </div>
    <div class="grid two">
      <label>Tax Rate (%)<input id="taxRate" type="number" min="0" step="0.01" placeholder="e.g. 12" /></label>
      <label>Additional Discount (₱, optional)<input id="discount" type="number" min="0" step="0.01" placeholder="0.00" /></label>
    </div>
    <p class="section-helper" style="margin-top:-4px;margin-bottom:16px;">
      Discount rows added in Step 3 are summed automatically. Use the field above only for an extra flat discount.
    </p>
    <label>Payment Bank / E-wallet<input id="paymentBank" type="text" placeholder="e.g. GCash, BPI" /></label>
  </section>

</div>
