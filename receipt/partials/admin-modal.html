<div id="adminModal" class="modal-backdrop" aria-hidden="true">
  <div class="admin-modal" role="dialog" aria-modal="true" aria-labelledby="adminModalTitle">
    <button id="closeAdminModalBtn" class="modal-close-btn" type="button" aria-label="Close admin editor">×</button>

    <!-- Password gate -->
    <div id="adminPasswordView" class="admin-modal-view">
      <span class="modal-lock-badge" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
          <path d="M7 11V7a5 5 0 0 1 10 0v4" />
        </svg>
      </span>
      <p class="section-kicker">Admin Locked</p>
      <h2 id="adminPasswordTitle">Unlock Settings Editor</h2>
      <p class="section-helper">Enter the admin password to edit payment details and footer text.</p>

      <label>Password
        <input id="adminPasswordInput" type="password" placeholder="Enter password" autocomplete="current-password" />
      </label>
      <p id="adminPasswordError" class="modal-error" aria-live="polite"></p>

      <div class="modal-actions">
        <button id="cancelAdminModalBtn" class="ghost-btn" type="button">Cancel</button>
        <button id="unlockAdminBtn" class="primary-btn" type="button">Unlock</button>
      </div>
    </div>

    <!-- Editor -->
    <div id="adminEditorView" class="admin-modal-view" hidden>
      <p class="section-kicker">Admin Editable</p>
      <h2 id="adminModalTitle">Receipt Settings</h2>
      <p class="section-helper">These fields are pre-filled by default. Update them whenever needed.</p>

      <div class="modal-tabs" role="tablist" aria-label="Admin settings">
        <button id="adminPaymentTabBtn" class="modal-tab-btn is-active" type="button" data-admin-tab="payment">Payment</button>
        <button id="adminFooterTabBtn"  class="modal-tab-btn"           type="button" data-admin-tab="footer">Footer</button>
      </div>

      <!-- Payment panel -->
      <div id="adminPaymentPanel" class="admin-tab-panel is-active">
        <div class="grid two">
          <label>Default Payment Method<input id="paymentMethod" type="text" placeholder="e.g. Cash" /></label>
          <label>Payment Bank / E-wallet<input id="paymentBank" type="text" placeholder="e.g. GCash" /></label>
        </div>
        <div class="grid two">
          <label>Account Number<input id="paymentAccount" type="text" placeholder="Account number" /></label>
          <label>Default Tax Rate (%)<input id="taxRate" type="number" min="0" step="0.01" placeholder="12" /></label>
        </div>
      </div>

      <!-- Footer panel -->
      <div id="adminFooterPanel" class="admin-tab-panel">
        <label>Payment Terms<textarea id="paymentTerms" rows="3"></textarea></label>
        <label>Return &amp; Refund Policy<textarea id="returnPolicy" rows="3"></textarea></label>
        <label>Warranty Note<textarea id="warrantyNote" rows="3"></textarea></label>
        <label>Support / Contact Info<textarea id="contactSupport" rows="2"></textarea></label>
      </div>

      <div class="modal-actions">
        <button class="ghost-btn close-admin-editor" type="button">Close</button>
        <button class="primary-btn close-admin-editor" type="button">Done</button>
      </div>
    </div>
  </div>
</div>
