<div id="adminModal" class="modal-backdrop" aria-hidden="true">
  <div class="admin-modal" role="dialog" aria-modal="true" aria-labelledby="adminModalTitle">
    <button id="closeAdminModalBtn" class="modal-close-btn" type="button" aria-label="Close admin editor">×</button>

    <!-- Password gate -->
    <div id="adminPasswordView" class="admin-modal-view">
      <span class="modal-lock-badge" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
          <path d="M7 11V7a5 5 0 0 1 10 0v4" />
        </svg>
      </span>
      <h2 id="adminPasswordTitle">Unlock Payment &amp; Terms Editor</h2>
      <p class="section-helper">Enter the admin password to edit payment details and warranty text.</p>

      <label>Password
        <input id="adminPasswordInput" type="password" placeholder="Enter password" autocomplete="current-password" />
      </label>
      <p id="adminPasswordError" class="modal-error" aria-live="polite"></p>

      <div class="modal-actions">
        <button id="cancelAdminModalBtn" class="ghost-btn" type="button">Cancel</button>
        <button id="unlockAdminBtn" class="primary-btn" type="button">Unlock</button>
      </div>
    </div>

    <!-- Editor -->
    <div id="adminEditorView" class="admin-modal-view" hidden>
      <p class="section-kicker">Admin Editable</p>
      <h2 id="adminModalTitle">Payment &amp; Terms Settings</h2>
      <p class="section-helper">These fields are pre-filled by default. Update them whenever needed.</p>

      <!-- Payment section -->
      <h3 style="margin:20px 0 12px;font-size:14px;font-weight:800;color:var(--text);">Payment Details</h3>
      <div class="grid two">
        <label>Bank / E-Wallet<input id="paymentBank" type="text" placeholder="e.g. GCASH" /></label>
        <label>Account Number<input id="paymentAccount" type="text" placeholder="e.g. 09760244320" /></label>
      </div>
      <label>Payment Terms
        <textarea id="paymentTerms" rows="5" placeholder="e.g. Option 1: Full payment upon receipt — ₱7,100&#10;Option 2: Full payment after repair — ₱8,900&#10;(Leave blank if not applicable)"></textarea>
      </label>

      <!-- Terms section -->
      <h3 style="margin:20px 0 12px;font-size:14px;font-weight:800;color:var(--text);">Warranty &amp; Notes</h3>
      <label>Warranty Badge Text
        <input id="warrantyNote" type="text" placeholder="e.g. 6 months warranty for parts and services (free of charge)" />
      </label>
      <label>Order and Payment Terms
        <textarea id="orderTerms" rows="3"></textarea>
      </label>
      <label>Warranty Approval Text
        <textarea id="warrantyApproval" rows="4"></textarea>
      </label>
      <label>Notes
        <textarea id="notesText" rows="2"></textarea>
      </label>

      <div class="modal-actions">
        <button class="ghost-btn close-admin-editor" type="button">Close</button>
        <button class="primary-btn close-admin-editor" type="button">Done</button>
      </div>
    </div>
  </div>
</div>
