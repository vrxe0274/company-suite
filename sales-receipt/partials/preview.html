<section class="panel preview-panel">
  <div class="section-title preview-title">
    <div class="section-heading">
      <p class="section-kicker">Live Preview</p>
      <h2>Preview</h2>
    </div>
    <div class="preview-actions" aria-label="Preview zoom controls">
      <button id="zoomOutBtn" class="zoom-btn" type="button" aria-label="Zoom out">−</button>
      <span id="zoomLevel" class="zoom-level">Fit</span>
      <button id="zoomInBtn" class="zoom-btn" type="button" aria-label="Zoom in">+</button>
      <button id="fitPreviewBtn" class="zoom-btn fit-btn" type="button">Fit</button>
    </div>
  </div>

  <div class="preview-scroll" id="previewScroll">
    <div id="previewCanvas" class="preview-canvas">
      <div id="receiptPreview"></div>
    </div>
  </div>
</section>
